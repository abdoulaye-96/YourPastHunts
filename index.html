<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Death Loop: Your Past Hunts You</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="800" height="600"></canvas>
        <div id="start-overlay">
            <button id="start-button" type="button">Start Game</button>
        </div>
        <div id="ui">
            <div id="score">Score: 0</div>
            <div id="loop-count">Loop: 0</div>
            <div id="health">Health: 2</div>
            <div id="instructions">WASD: Move, Space: Attack, Shift: Dash</div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
